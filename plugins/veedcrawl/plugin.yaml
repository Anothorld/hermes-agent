name: veedcrawl
version: 0.2.0
description: "Veedcrawl video intelligence — 6 tools (account, metadata, transcript, extract, profile, job) over the Veedcrawl REST API. Wraps async transcript/extract jobs with built-in polling, response caching, rate-limit recovery, and credit guardrails. Use ``veedcrawl_job`` (or transcript/extract with job_id alone) to fetch results of an earlier async submission without spending new credits. Auth via the VEEDCRAWL_API_KEY env var (X_API_KEY also accepted)."
author: agent_prj
kind: backend
provides_tools:
  - veedcrawl_account
  - veedcrawl_metadata
  - veedcrawl_transcript
  - veedcrawl_extract
  - veedcrawl_profile
  - veedcrawl_job
